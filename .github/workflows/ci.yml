name: CI

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: ./backend/dotnet restore

      - name: Build
        run: ./backend/dotnet build --no-restore --configuration Release

      - name: Test
        run: ./backend/dotnet test --no-build --configuration Release